<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dead Reckoning</title>
<style>
  :root{
    --navy-950:#070d16;
    --navy-900:#0c1622;
    --navy-800:#122036;
    --navy-700:#1a2c46;
    --steel-600:#3c4c60;
    --steel-400:#7c8ea3;
    --steel-300:#a7b6c6;
    --text:#e5edf5;
    --text-dim:#9fb0c2;
    --amber-400:#e8a33d;
    --amber-300:#f3c374;
    --teal-400:#3fc7ae;
    --teal-300:#7fe0cc;
    --danger:#d9645f;
    --gold:#ffd45c;
    --font-mono: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Consolas, "Courier New", monospace;
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--navy-950);color:var(--text);font-family:var(--font-ui);height:100%;overflow:hidden;}
  body{
    background-image:
      radial-gradient(ellipse at 20% -10%, rgba(63,199,174,0.08), transparent 60%),
      radial-gradient(ellipse at 90% 110%, rgba(232,163,61,0.06), transparent 55%);
    height:100vh;
    display:flex;
    flex-direction:column;
  }
  header.top{
    padding:14px 20px;
    border-bottom:1px solid var(--steel-600);
    display:flex;
    align-items:baseline;
    gap:14px;
    flex-wrap:wrap;
    background:var(--navy-900);
  }
  header.top h1{
    font-family:var(--font-mono);
    font-size:20px;
    letter-spacing:2px;
    margin:0;
    color:var(--amber-300);
    font-weight:700;
  }
  header.top .subtitle{
    font-size:12.5px;
    color:var(--text-dim);
    font-family:var(--font-mono);
  }
  header.top .storm{
    margin-left:auto;
    font-size:12px;
    color:var(--danger);
    font-family:var(--font-mono);
    border:1px solid rgba(217,100,95,0.4);
    background:rgba(217,100,95,0.08);
    padding:4px 10px;
    border-radius:4px;
    letter-spacing:0.5px;
  }
  .layout{
    flex:1;
    min-height:0;
    display:grid;
    grid-template-columns:1.3fr 1fr;
    grid-template-rows:1fr;
    gap:16px;
    padding:16px;
    max-width:1400px;
    margin:0 auto;
    width:100%;
  }
  @media (max-width:900px){
    html,body{overflow:auto;height:auto;}
    body{height:auto;}
    .layout{grid-template-columns:1fr;grid-template-rows:auto auto;height:auto;}
  }
  .panel{
    background:var(--navy-900);
    border:1px solid var(--steel-600);
    border-radius:8px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    min-height:0;
  }
  .term-panel{min-height:0;}
  .term-titlebar{
    background:var(--navy-800);
    border-bottom:1px solid var(--steel-600);
    padding:8px 12px;
    font-family:var(--font-mono);
    font-size:11.5px;
    color:var(--steel-300);
    display:flex;
    gap:8px;
    align-items:center;
  }
  .term-titlebar .dot{width:9px;height:9px;border-radius:50%;background:var(--steel-600);}
  .term-titlebar .dot.a{background:var(--danger);}
  .term-titlebar .dot.b{background:var(--amber-400);}
  .term-titlebar .dot.c{background:var(--teal-400);}
  .term-titlebar .label{margin-left:6px;}
  #output{
    flex:1;
    min-height:0;
    padding:14px 16px;
    overflow-y:auto;
    font-family:var(--font-mono);
    font-size:14px;
    line-height:1.6;
    white-space:pre-wrap;
    word-break:break-word;
  }
  #output::-webkit-scrollbar{width:10px;}
  #output::-webkit-scrollbar-thumb{background:var(--steel-600);border-radius:5px;}
  #output::-webkit-scrollbar-track{background:var(--navy-900);}
  .line-cmd{color:var(--teal-300);}
  .line-cmd .promptchar{color:var(--amber-400);}
  .line-narr{color:var(--text);}
  .line-dim{color:var(--text-dim);}
  .line-item{color:var(--gold);}
  .line-hank{color:var(--amber-300);}
  .line-err{color:var(--danger);}
  .line-good{color:var(--teal-300);}
  .line-head{color:var(--steel-300);}
  .input-row{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 16px;
    border-top:1px solid var(--steel-600);
    background:var(--navy-800);
    font-family:var(--font-mono);
    font-size:14px;
  }
  .input-row .prompt{
    color:var(--teal-300);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:45%;
  }
  .input-row .prompt .dollar{color:var(--amber-400);margin-left:2px;}
  .input-row input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font-family:var(--font-mono);
    font-size:14px;
    min-width:0;
  }
  .cheatsheet-toggle{
    border-top:1px solid var(--steel-600);
    background:var(--navy-800);
    color:var(--steel-300);
    font-family:var(--font-mono);
    font-size:12px;
    padding:8px 16px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    user-select:none;
  }
  .cheatsheet-toggle:hover{color:var(--amber-300);}
  .cheatsheet-body{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.25s ease;
    background:var(--navy-950);
    border-top:0px solid var(--steel-600);
  }
  .cheatsheet-body.open{
    max-height:260px;
    overflow-y:auto;
    border-top:1px solid var(--steel-600);
  }
  .cheatsheet-body table{
    width:100%;
    border-collapse:collapse;
    font-family:var(--font-mono);
    font-size:12.5px;
  }
  .cheatsheet-body td{
    padding:7px 16px;
    border-bottom:1px solid var(--navy-800);
    vertical-align:top;
  }
  .cheatsheet-body td.cmd{color:var(--amber-300);white-space:nowrap;width:1%;}
  .cheatsheet-body td.desc{color:var(--text-dim);}
  /* scene panel */
  .scene-panel{padding:0;overflow-y:auto;}
  .scene-frame{
    aspect-ratio:4/3;
    background:var(--navy-950);
    border-bottom:1px solid var(--steel-600);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px;
  }
  .scene-frame svg{width:100%;height:100%;}
  .scene-caption{
    padding:14px 16px;
    font-family:var(--font-mono);
    font-size:12.5px;
    color:var(--text-dim);
  }
  .scene-caption .locname{
    color:var(--amber-300);
    font-size:14px;
    display:block;
    margin-bottom:4px;
    letter-spacing:0.5px;
  }
  .flags-row{
    display:flex;
    gap:8px;
    padding:0 16px 16px;
    flex-wrap:wrap;
  }
  .flag{
    font-family:var(--font-mono);
    font-size:11px;
    padding:4px 8px;
    border-radius:4px;
    border:1px solid var(--steel-600);
    color:var(--steel-400);
  }
  .flag.on{
    color:var(--teal-300);
    border-color:rgba(63,199,174,0.5);
    background:rgba(63,199,174,0.08);
  }
  .win-banner{
    margin:0 16px 16px;
    padding:14px;
    border:1px solid var(--teal-400);
    background:rgba(63,199,174,0.08);
    border-radius:6px;
    color:var(--teal-300);
    font-family:var(--font-mono);
    font-size:13px;
    display:none;
  }
  .win-banner.show{display:block;}
  .win-actions{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
  .win-actions label{font-size:11.5px;color:var(--text-dim);}
  .win-actions input{
    background:var(--navy-950);
    border:1px solid var(--steel-600);
    border-radius:4px;
    color:var(--text);
    font-family:var(--font-mono);
    font-size:13px;
    padding:6px 8px;
  }
  .win-buttons{display:flex;gap:8px;flex-wrap:wrap;}
  .win-buttons button{
    font-family:var(--font-mono);
    font-size:12.5px;
    padding:8px 14px;
    border-radius:4px;
    border:1px solid var(--teal-400);
    background:rgba(63,199,174,0.12);
    color:var(--teal-300);
    cursor:pointer;
  }
  .win-buttons button:hover{background:rgba(63,199,174,0.22);}
  .win-buttons button#restartBtn{
    border-color:var(--amber-400);
    background:rgba(232,163,61,0.12);
    color:var(--amber-300);
  }
  .win-buttons button#restartBtn:hover{background:rgba(232,163,61,0.22);}
</style>
</head>
<body>

<header class="top">
  <h1>DEAD RECKONING</h1>
  <span class="subtitle">a Linux terminal survival story</span>
  <span class="storm" id="stormStatus">STORM SYSTEM: approaching, ETA unknown</span>
</header>

<div class="layout">
  <div class="panel term-panel">
    <div class="term-titlebar">
      <span class="dot a"></span><span class="dot b"></span><span class="dot c"></span>
      <span class="label">crew@island — bash</span>
    </div>
    <div id="output"></div>
    <div class="input-row">
      <span class="prompt" id="promptLabel"></span>
      <input id="cmdInput" autocomplete="off" spellcheck="false" autofocus />
    </div>
    <div class="cheatsheet-toggle" id="cheatToggle">
      <span>&#9656; command reference</span>
      <span id="cheatCount"></span>
    </div>
    <div class="cheatsheet-body" id="cheatBody">
      <table id="cheatTable"></table>
    </div>
  </div>

  <div class="panel scene-panel">
    <div class="scene-frame" id="sceneFrame"></div>
    <div class="scene-caption">
      <span class="locname" id="locName"></span>
      <span id="locHint"></span>
    </div>
    <div class="flags-row" id="flagsRow"></div>
    <div class="win-banner" id="winBanner">
      RESCUE COMPLETE — you can keep exploring, or wrap up below.
      <div class="win-actions">
        <label for="certName">Name for certificate (optional):</label>
        <input id="certName" type="text" maxlength="40" placeholder="Type your name...">
        <div class="win-buttons">
          <button id="certBtn">Download Certificate</button>
          <button id="restartBtn">Play Again</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ================= ART ================= */

function curLoc(){ return world[state.path[state.path.length-1]]; }
function curPathStr(){
  if(state.path.length===1) return '~';
  return '~/'+state.path.slice(1).join('/');
}
function print(text, cls){
  const div = document.createElement('div');
  div.className = cls || 'line-narr';
  div.textContent = text;
  outputEl.appendChild(div);
  outputEl.scrollTop = outputEl.scrollHeight;
}
function printBlank(){ print('', 'line-narr'); }
function printEcho(cmdText){
  const div = document.createElement('div');
  div.className = 'line-cmd';
  div.innerHTML = '<span class="promptchar">crew@island:'+escapeHtml(curPathStr())+'$</span> '+escapeHtml(cmdText);

}
function escapeHtml(s){
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

/* ================= COMMANDS ================= */
function doLs(){
  const loc = curLoc();
  print(' Locations: (cd NAME to enter)', 'line-head');
  loc.locations.forEach(l=>print(l, 'line-good'));
  print(' Items: (cat or less NAME to read — anything ending in .txt is a file)', 'line-head');
  Object.keys(loc.items).forEach(i=>print(i, 'line-item'));
}

function doPwd(){
  print(curPathStr(), 'line-dim');
}

function doCd(args){
  const loc = curLoc();
  if(args.length===0 || args[0]==='~'){
    state.path = ['~'];
    print(world['~'].enter, 'line-narr');
    afterMove();
    return;
  }
  if(args[0]==='..'){
    if(state.path.length===1){
      print('You\'re already home.', 'line-dim');
      return;
    }
    state.path.pop();
    print('You have moved back to '+curLoc().name+'.', 'line-narr');
    afterMove();
    return;
  }
  const target = args[0];
  if(loc.locations.includes(target)){
    state.path.push(target);
    print('You have moved to '+world[target].name+'.', 'line-narr');
    const enterText = world[target].enter;
    if(enterText === 'ENDING'){
      runEnding();
      return;
    }
    print(enterText, 'line-narr');
    afterMove();
    runLocationTrigger(target);
    return;
  }
  if(loc.items[target]){
    if(loc.items[target].deadEndCd){
      print(loc.items[target].deadEndCd, 'line-hank');
    } else {
      print('bash: cd: '+target+': Not a directory', 'line-err');
    }
    return;
  }
  print('bash: cd: '+target+': No such file or directory', 'line-err');
}

function afterMove(){
  updatePrompt();
  refreshScene();
  checkTriggers();
}

function doReadItem(cmdUsed, itemName){
  const loc = curLoc();
  const item = loc.items[itemName];
  if(!item){
    if(loc.locations.includes(itemName)){
      print(cmdUsed+': '+itemName+': Is a directory', 'line-err');
    } else {
      print(cmdUsed+': '+itemName+': No such file or directory', 'line-err');
    }
    return;
  }
  if(item.pager && cmdUsed==='cat'){
    print('(that one\'s long — less works better for this)', 'line-dim');
  }
  if(!item.pager && cmdUsed==='less'){
    print('(short enough for cat, but here you go)', 'line-dim');
  }
  print(item.content, 'line-narr');
  if(item.onFirstRead==='discover-mv'){ discover('mv'); }
  if(item.onFirstRead==='discover-helpman'){ discover('help'); discover('man'); }
}

function doMv(args){
  if(args.length<2){ print('mv: missing destination', 'line-err'); return; }
  const objName = args[0], dest = args[1];
  const loc = curLoc();
  const item = loc.items[objName];
  if(!item){
    print("mv: cannot stat '"+objName+"': No such file or directory", 'line-err');
    return;
  }
  if(objName==='Rockslide.txt'){
    if(dest==='Crawlspace' && loc===world.FloodedChamber){
      delete loc.items['Rockslide.txt'];
      loc.locations.push('Crawlspace','StoneVault');
      print('Moved Rockslide.txt to Crawlspace.', 'line-good');
      print('The boulder scrapes free. Stale air rushes past — and past it, a wider passage you couldn\'t see before.', 'line-narr');
      refreshScene();
      return;
    }
    print("mv: Rockslide.txt won't budge that way — it's wedged in place except toward Crawlspace.", 'line-err');
    return;
  }
  if(objName==='StackedCrates.txt'){
    if(dest==='Generator' && loc===world.SupplyCloset){
      delete loc.items['StackedCrates.txt'];
      loc.locations.push('Generator');
      print('Moved StackedCrates.txt to Generator.', 'line-good');
      print('The crates shift and topple sideways, clearing the doorway. There\'s a room back there after all.', 'line-narr');
      refreshScene();
      return;
    }
    print("mv: StackedCrates.txt won't budge that way — it's only going toward Generator.", 'line-err');
    return;
  }
  if(dest==='~'){
    delete loc.items[objName];
    world['~'].items[objName] = item;
    print('Moved '+objName+' to ~.', 'line-good');
    handleCollect(objName);
    return;
  }
  print("mv: cannot move '"+objName+"' there — '"+dest+"' isn't a real destination yet.", 'line-err');
}

function handleCollect(itemName){
  if(itemName==='SparePart.txt'){
    state.flags.hasSparePart = true;
    print('Hank, through the radio: "That\'s it? That\'s the thing I needed for three years?" Somewhere behind that relief he sounds annoyed at himself.', 'line-hank');
  }
  if(itemName==='AntennaPart.txt'){
    state.flags.hasAntennaPart = true;
    print('Hank, through the radio: "Careful with that — that\'s the part. THE part."', 'line-hank');
  }
  if(state.flags.hasSparePart && state.flags.hasAntennaPart && !world['~'].locations.includes('ServerRoom')){
    world['~'].locations.push('ServerRoom');
    printBlank();
    print('Hank, practically shouting through the radio: "Both parts?! Okay — okay, get back to Camp, there should be a Server Room listed there now. I never had time to read through all those logs myself, but the actual frequency\'s got to be written down somewhere in one of them. Don\'t read every single one by hand — try this: grep frequency *   That searches every log at once for anything containing the word frequency."', 'line-hank');
  }
  renderFlags();
}

function doGrep(args){
  if(args.length<2){ print('grep: usage: grep TERM NAME', 'line-err'); return; }
  const term = args[0].toLowerCase();
  const targetArg = args[1];
  const loc = curLoc();
  let anyMatch = false;
  let names = targetArg==='*' ? Object.keys(loc.items) : [targetArg];
  names.forEach(name=>{
    const item = loc.items[name];
    if(!item){
      if(targetArg!=='*') print('grep: '+name+': No such file or directory', 'line-err');
      return;
    }
    const lines = item.content.split('\n');
    lines.forEach(line=>{
      if(line.toLowerCase().includes(term)){
        anyMatch = true;
        const prefix = names.length>1 ? name+': ' : '';
        print(prefix+line, 'line-good');
      }
    });
  });
  if(!anyMatch){
    print("grep: no matches found for '"+args[0]+"'", 'line-dim');
  } else if(loc===world.ServerRoom && (term.includes('freq')||term.includes('156.8')||term.includes('coast'))){
    if(!state.flags.hasFrequency){
      state.flags.hasFrequency = true;
      world.ServerRoom.locations.push('BlastDoor');
      printBlank();
      print('Hank, quiet for once: "156.800... yeah. Yeah, that\'s it. That\'s our frequency. There\'s a Blast Door listed in there now — that\'s the way to the tower room. Go."', 'line-hank');
      renderFlags();
    }
  }
}

function doInventory(){
  print('This is just what\'s sitting in ~ (Camp) — same as cd ~ then ls.', 'line-dim');
  const homeItems = Object.keys(world['~'].items);
  if(homeItems.length===0){
    print('Nothing yet.', 'line-dim');
    return;
  }
  homeItems.forEach(i=>print(i, 'line-item'));
}

function doHelp(){
  print('Commands you know so far:', 'line-head');
  [...state.discovered].forEach(cmd=>print('  '+cmd, 'line-good'));
}

function doMan(args){
  if(args.length===0){ print('man: what command do you need help with?', 'line-err'); return; }
  const cmd = args[0];
  if(COMMAND_INFO[cmd]){
    print(cmd.toUpperCase(), 'line-head');
    print(COMMAND_INFO[cmd], 'line-narr');
  } else {
    print('No manual entry for '+cmd, 'line-err');
  }
}

function runEnding(){
  state.flags.doorOpened = true;

  setSceneArt('tower', loc.name);
  locName.textContent = loc.name;

  locName.textContent = 'Making the Call';
  locHint.textContent = curPathStr();
  print('Static. More static. Then—', 'line-narr');
  print('"—this is Station 7, do you copy, this is Station 7, we have survivors requesting immediate—"', 'line-hank');
  print('A pause. Then a voice that isn\'t Hank\'s crackles back through the speaker, calm and bored in the specific way of someone who does this every day.', 'line-narr');
  print('"Station 7, Coast Guard copies. We have your position. Sit tight — you\'ve got about four hours before that storm makes landfall, and we\'ll be there in two."', 'line-narr');

  state.path.push('Rescue');
  setSceneArt('rescue', 'Rescue');
  locName.textContent = 'Rescue';
  locHint.textContent = curPathStr();
  print('Hank sits down hard on an overturned crate and doesn\'t say anything for a while. Then: "Four years. Took you people four years."', 'line-hank');
  const extras = [];
  if(world['~'].items['Photo.txt']) extras.push('The old station photo is still in your bag. Hank goes quiet again when he sees it.');
  if(world['~'].items['SeaGlass.txt']) extras.push('The sea glass made it the whole way. Small things do, sometimes.');
  if(world['~'].items['Mug.txt']) extras.push('Hank spots his mug in your bag and doesn\'t say anything about it — just holds onto it the rest of the way out.');
  if(extras.length){
    printBlank();
    extras.forEach(e=>print(e, 'line-narr'));
  }
  printBlank();
  print('RESCUE COMPLETE.', 'line-good');
  print('Everyone gets off the island — you, your crew, and one extremely relieved radio operator.', 'line-narr');
  state.flags.gameComplete = true;
  renderFlags();
  updatePrompt();
}

/* ================= INPUT LOOP ================= */
const history = [];
let historyIdx = -1;

function handleCommand(raw){
  const trimmed = raw.trim();
  if(trimmed.length===0) return;
  printEcho(trimmed);
  history.push(trimmed);
  historyIdx = history.length;
  const parts = trimmed.split(/\s+/);
  const cmd = parts[0];
  const args = parts.slice(1);

  switch(cmd){
    case 'ls': doLs(); break;
    case 'pwd': doPwd(); break;
    case 'cd': doCd(args); break;
    case 'cat': args.length? doReadItem('cat', args[0]) : print('cat: missing item name', 'line-err'); break;
    case 'less': args.length? doReadItem('less', args[0]) : print('less: missing item name', 'line-err'); break;
    case 'mv':
      if(!state.mvExplained){
        state.mvExplained = true;
        print('(first time using mv — quick reminder: it always works as mv OBJECT DESTINATION. The thing first, then where it goes. mv OBJECT ~ sends something home to Camp.)', 'line-dim');
      }
      doMv(args);
      break;
    case 'grep': doGrep(args); break;
    case 'help': doHelp(); break;
    case 'man': doMan(args); break;
    case 'clear': outputEl.innerHTML=''; break;
    case 'inventory': case 'inv': doInventory(); break;
    case 'restart': resetGame(); break;
    default:
      print('bash: '+cmd+': command not found', 'line-err');
  }
}

inputEl.addEventListener('keydown', (e)=>{
  if(e.key==='Enter'){
    handleCommand(inputEl.value);
    inputEl.value='';
  } else if(e.key==='ArrowUp'){
    if(historyIdx>0){ historyIdx--; inputEl.value = history[historyIdx]; }
    e.preventDefault();
  } else if(e.key==='ArrowDown'){
    if(historyIdx<history.length-1){ historyIdx++; inputEl.value = history[historyIdx]; }
    else { historyIdx = history.length; inputEl.value=''; }
    e.preventDefault();
  }
});

function escapeForHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openCertificate(){

  const dateStr = new Date().toLocaleDateString(undefined, {year:'numeric', month:'long', day:'numeric'});
  const w = window.open('', '_blank');
  if(!w){ alert('Please allow pop-ups to download the certificate.'); return; }
  w.document.write(`<!DOCTYPE html><html><head><title>Certificate of Completion</title><meta charset="UTF-8">
  <style>
    body{font-family: Georgia, 'Times New Roman', serif; background:#fff; margin:0; padding:60px; color:#0c1622;}
    .cert{border:8px double #1a2c46; padding:50px; text-align:center; max-width:800px; margin:0 auto;}
    h1{font-size:14px; letter-spacing:4px; color:#7c8ea3; text-transform:uppercase; margin:0 0 6px;}
    h2{font-size:36px; color:#1a2c46; margin:0 0 26px; font-weight:700;}
    .name{font-size:30px; color:#c9840f; margin:22px 0; font-style:italic; border-bottom:2px solid #1a2c46; display:inline-block; padding:0 24px 8px;}
    .body-text{font-size:16px; line-height:1.7; max-width:600px; margin:18px auto;}
    .commands{font-size:13px; color:#3c4c60; margin-top:26px; letter-spacing:1px;}
    .date{margin-top:36px; font-size:14px; color:#3c4c60;}
    .sig{margin-top:50px; display:flex; justify-content:space-around;}
    .sig div{border-top:1px solid #3c4c60; padding-top:6px; width:200px; font-size:12px; color:#3c4c60;}
    @media print{ body{padding:20px;} }
  </style></head><body>
  <div class="cert">
    <h1>Dead Reckoning</h1>
    <h2>Certificate of Completion</h2>
    <p class="body-text">This certifies that</p>
    <div class="name">${name}</div>
    <p class="body-text">successfully navigated Station 7 from the command line, restored power to the radio tower, and got the whole crew — Hank Osei included — off the island.</p>
    <p class="commands">Commands mastered: ls &middot; cd &middot; pwd &middot; cat &middot; less &middot; mv &middot; grep &middot; help &middot; man</p>
    <p class="date">${dateStr}</p>
    <div class="sig"><div>Instructor Signature</div><div>Date</div></div>
  </div>
  </body></html>`);
  w.document.close();
  setTimeout(()=>{ w.focus(); w.print(); }, 300);
}

function resetGame(){
  const fresh = JSON.parse(JSON.stringify(pristineWorld));
  Object.keys(world).forEach(k=>delete world[k]);
  Object.assign(world, fresh);
  state.path = ['~'];
  state.flags = {hasSparePart:false, hasAntennaPart:false, hasFrequency:false, doorOpened:false, gameComplete:false};
  state.discovered = new Set(['ls','cd','pwd','cat','less','clear','inventory','restart']);
  state.triggeredLocations = new Set();
  state.mvExplained = false;
  outputEl.innerHTML = '';
  document.getElementById('certName').value = '';
  history.length = 0;
  historyIdx = 0;
  init();
}
